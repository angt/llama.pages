name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # `playwright install --with-deps` runs apt under `sudo --` (env not preserved); on the
      # Ubuntu 24.04 runner its needrestart hook prompts interactively and hangs the job. Force
      # needrestart into automatic mode via its config file so the apt install never blocks.
      - name: Disable needrestart interactive prompts
        run: echo "\$nrconf{restart} = 'a';" | sudo tee /etc/needrestart/conf.d/99-ci.conf

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm test
